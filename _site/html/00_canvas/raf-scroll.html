<script type="module">
import { rafScroll } from '/assets/js/raf-scroll.mjs';
$(function () {
	let _scrollEase = 0.95;

	const _svgPathMotion = function(el) {
		let svg = el.find('svg');
		let pathLength = svg.find('path').length;
		let pathTotalLength = [];

		const _init = () => {
			svg.find('path').each(function () {
				pathTotalLength.push($(this)[0].getTotalLength());
			});
		}
		const _draw = (_this, _percent) => {
			_this.css({
				'stroke-dasharray' : pathTotalLength[_this.index()],
				'stroke-dashoffset' : pathTotalLength[_this.index()]*(1-_percent)
			});
		}
		const _scroll = (_easing) => {
			svg.find('path').each(function (i) {
				let st = (typeof(_easing) == 'number') ? _easing : $(window).scrollTop();
				
				let _scrollTop = st - el.offset().top;
				let _moveArea = el.height() - $(window).height();
				let areaDivision = (_moveArea/pathLength);
				
				let _percent = Math.min(1, (_scrollTop-(i*areaDivision)) / areaDivision );
				_percent = Math.min(1, Math.max(0, _percent));

				_draw($(this), _percent);
			});
		}
		_init();

		return {
			scroll : _scroll
		}
	}
	let svgPathMotion1 = new _svgPathMotion($('.sticky-wrap.first'));
	let svgPathMotion2 = new _svgPathMotion($('.sticky-wrap.second'));
	svgPathMotion1.scroll();
	svgPathMotion2.scroll();
	$(window).on('scroll', svgPathMotion1.scroll);
	$(window).off('scroll.raf').on('scroll.raf', rafScroll(svgPathMotion2.scroll, _scrollEase));


	// gui 제어
	let gui = new dat.GUI({ autoPlace : false });
	$('.sticky-wrap.second .move-wrap').append($(gui.domElement));

	let lightControl = {
		ease : _scrollEase
	}
	gui.add(lightControl, 'ease', 0, 0.99).step(0.01).onChange(function (val){
		_scrollEase = val;
		$(window).off('scroll.raf').on('scroll.raf', rafScroll(svgPathMotion2.scroll, _scrollEase));
	});
});
</script>
